<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeXP — Panel rodzica</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e0f13">
  <link rel="apple-touch-icon" href="icon.svg">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});</script>
  <style>
    body { min-height: 100vh; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 28px 16px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .topbar h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .topbar h1 span { color: var(--accent); }

    /* Login */
    .login-wrap { max-width: 400px; margin: 8vh auto 0; padding: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
    .btn-full { width: 100%; margin-top: 8px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: var(--text2); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }
    .error-msg { color: var(--warn); font-size: 13px; margin-top: 10px; display: none; }

    .ro-badge { font-size: 12px; color: var(--text2); background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; }

    .balance-card { background: linear-gradient(135deg, var(--accent) 0%, #4a42d0 100%); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
    .balance-label { font-size: 13px; color: rgba(255,255,255,.7); font-weight: 500; }
    .balance-amount { font-size: 44px; font-weight: 700; font-family: var(--mono); margin: 4px 0; }
    .balance-pts { font-size: 14px; color: rgba(255,255,255,.7); }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
    .stat-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; font-family: var(--mono); }
    .stat-value.green { color: var(--accent2); }
    .stat-value.purple { color: var(--accent); }
    .stat-value.gold { color: var(--gold); }

    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); min-height: 2px; transition: height .5s ease; }
    .bar-label { font-size: 10px; color: var(--text2); }
    .bar-val { font-size: 10px; color: var(--text2); font-family: var(--mono); }

    .activity-item, .purchase-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .activity-item:last-child, .purchase-item:last-child { border-bottom: none; }
    .activity-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .activity-info { flex: 1; }
    .activity-name { font-size: 14px; font-weight: 500; }
    .activity-meta { font-size: 12px; color: var(--text2); }
    .activity-pts { font-size: 14px; font-weight: 700; color: var(--accent2); font-family: var(--mono); }
    .purchase-item { justify-content: space-between; }

    .pg-wrap { background: var(--bg3); border-radius: 6px; height: 8px; overflow: hidden; }
    .pg-bar { height: 100%; background: var(--accent); border-radius: 6px; }

    .child-select { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; }
    .child-select select { max-width: 260px; }
    h3.sec { font-size: 15px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-wrap" id="login-view">
    <div class="logo" style="text-align:center;margin-bottom:28px">
      <h1 style="font-size:32px;font-weight:700">Life<span style="color:var(--accent)">XP</span></h1>
      <p style="color:var(--text2);font-size:14px;margin-top:4px">Panel rodzica</p>
    </div>
    <div class="card">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" maxlength="254" placeholder="rodzic@email.com">
      </div>
      <div class="form-group">
        <label>Hasło</label>
        <input type="password" id="login-password" maxlength="128" placeholder="••••••••">
      </div>
      <button class="btn-primary btn-full" onclick="loginEmail()">Zaloguj się</button>
      <div class="divider">lub</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M46.145 24.504c0-1.6-.144-3.136-.413-4.608H24v8.72h12.418c-.536 2.88-2.163 5.32-4.61 6.955v5.782h7.462c4.363-4.018 6.875-9.938 6.875-16.849z"/>
          <path fill="#34A853" d="M24 47c6.237 0 11.468-2.067 15.27-5.603l-7.462-5.782c-2.067 1.386-4.71 2.205-7.808 2.205-6.005 0-11.09-4.055-12.907-9.504H3.437v5.974C7.22 41.8 15.007 47 24 47z"/>
          <path fill="#FBBC05" d="M11.093 28.316A14.83 14.83 0 0 1 10.364 24c0-1.49.256-2.938.729-4.316v-5.974H3.437A22.99 22.99 0 0 0 1 24c0 3.713.89 7.228 2.437 10.29l7.656-5.974z"/>
          <path fill="#EA4335" d="M24 9.18c3.383 0 6.42 1.163 8.808 3.446l6.607-6.607C35.462 2.292 30.231 0 24 0 15.007 0 7.22 5.2 3.437 13.71l7.656 5.974C12.91 13.235 17.995 9.18 24 9.18z"/>
        </svg>
        Kontynuuj z Google
      </button>
      <p class="text2" style="margin-top:14px;font-size:12px">Zaloguj się adresem email, który Twoje dziecko wpisało w Ustawieniach → „Email rodzica".</p>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <!-- DASHBOARD (read-only) -->
  <div class="wrap" id="dash-view" style="display:none">
    <div class="topbar">
      <h1>Life<span>XP</span> · Rodzic</h1>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="ro-badge">👁 tylko podgląd</span>
        <button class="btn-secondary" onclick="logout()" style="padding:8px 14px;font-size:13px">Wyloguj</button>
      </div>
    </div>

    <div class="child-select" id="child-select" style="display:none">
      <label class="text2">Dziecko:</label>
      <select id="child-picker" onchange="selectChild(this.value)"></select>
    </div>

    <div id="child-content">
      <p class="text2">Ładowanie…</p>
    </div>
  </div>

  <div id="toast"></div>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    const POINTS_PER_PLN = 10;
    const ACTIVITIES = [
      { value: 'learning', label: '📚 Nauka (JS, Unity, C#)', color: '#6c63ff' },
      { value: 'project', label: '💻 Praca nad projektem', color: '#4ecca3' },
      { value: 'reading', label: '📖 Czytanie / kurs', color: '#ffd700' },
      { value: 'exercise', label: '🏃 Ćwiczenia fizyczne', color: '#ff6b6b' },
      { value: 'school', label: '🏫 Zadania szkolne', color: '#8a8fa8' },
    ];

    let children = [];

    const formatPLN = (pts) => (pts / POINTS_PER_PLN).toFixed(2).replace('.', ',') + ' zł';
    const formatMinutes = (min) => { const h = Math.floor(min / 60), m = min % 60; return h > 0 ? `${h}h ${m}m` : `${m}m`; };
    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const prefersReduced = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = `show ${type}`;
      setTimeout(() => el.className = '', 3000);
    }
    function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; }

    window.loginEmail = async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showError('Wypełnij wszystkie pola.');
      try { await signInWithEmailAndPassword(auth, email, password); }
      catch (e) { showError('Nieprawidłowy email lub hasło.'); }
    };
    window.loginGoogle = async () => {
      try { await signInWithPopup(auth, googleProvider); }
      catch (e) { showError('Logowanie nie powiodło się.'); }
    };
    window.logout = async () => { await signOut(auth); };

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        document.getElementById('login-view').style.display = 'block';
        document.getElementById('dash-view').style.display = 'none';
        return;
      }
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('dash-view').style.display = 'block';
      await loadChildren(user);
    });

    async function loadChildren(user) {
      const content = document.getElementById('child-content');
      try {
        const snap = await getDocs(query(collection(db, 'users'), where('parentEmail', '==', user.email)));
        children = snap.docs.map(d => ({ uid: d.id, ...d.data() }));

        if (children.length === 0) {
          content.innerHTML = `<div class="card"><p class="text2">Brak powiązanych kont dla <b>${escapeHtml(user.email)}</b>.<br><br>
            Poproś dziecko, by w aplikacji weszło w <b>Ustawienia → Email rodzica</b> i wpisało dokładnie ten adres (wielkość liter ma znaczenie).</p></div>`;
          return;
        }

        const picker = document.getElementById('child-picker');
        if (children.length > 1) {
          document.getElementById('child-select').style.display = 'flex';
          picker.innerHTML = children.map((c, i) => `<option value="${i}">${escapeHtml(c.name || 'Dziecko')}</option>`).join('');
        }
        selectChild(0);
      } catch (e) {
        console.error(e);
        content.innerHTML = `<div class="card"><p class="text2">Nie udało się wczytać danych. Jeśli to konto powinno mieć dostęp, sprawdź czy reguły Firestore są wgrane.</p></div>`;
      }
    }

    window.selectChild = async (i) => {
      const child = children[i];
      if (!child) return;
      const content = document.getElementById('child-content');
      content.innerHTML = '<p class="text2">Ładowanie…</p>';

      // Last 7 days
      const days = [];
      for (let d = 6; d >= 0; d--) { const t = new Date(); t.setDate(t.getDate() - d); days.push(t.toISOString().split('T')[0]); }

      let weekPts = 0, weekGaming = 0;
      const ptsData = [], gamingData = [];
      for (const day of days) {
        const s = await getDoc(doc(db, 'users', child.uid, 'dailyLog', day));
        const p = s.exists() ? (s.data().pointsEarned || 0) : 0;
        const g = s.exists() ? (s.data().gamingMinutes || 0) : 0;
        ptsData.push(p); gamingData.push(g); weekPts += p; weekGaming += g;
      }

      const actSnap = await getDocs(query(collection(db, 'users', child.uid, 'activities'), orderBy('timestamp', 'desc'), limit(10)));
      const purSnap = await getDocs(query(collection(db, 'users', child.uid, 'purchases'), orderBy('timestamp', 'desc'), limit(10)));

      // Obowiązki domowe: nierozliczone saldo + historia wypłat (osobna waluta, 0,45 zł/pkt).
      const choreSnap = await getDocs(collection(db, 'users', child.uid, 'chores'));
      const payoutSnap = await getDocs(query(collection(db, 'users', child.uid, 'chorePayouts'), orderBy('createdAt', 'desc'), limit(12)));
      const chorePts = choreSnap.docs.reduce((s, d) => s + (d.data().points || 0), 0);
      const choreOutstanding = (chorePts * 0.45).toFixed(2).replace('.', ',') + ' zł';

      // Money tracker: rodzic widzi TYLKO saldo (money/balance). Cele oszczędnościowe
      // to teraz cele z dashboardu (pole users/{uid}.goals) — transakcje, kategorie
      // i pożyczki są owner-only w regułach Firestore.
      const goals = Array.isArray(child.goals) ? child.goals : [];
      let moneyCurrent = null;
      try {
        const mbSnap = await getDoc(doc(db, 'users', child.uid, 'money', 'balance'));
        if (mbSnap.exists()) moneyCurrent = mbSnap.data().current || 0;
      } catch (e) { /* moduł Money jeszcze nie używany lub reguły nie wgrane — saldo się nie pokaże */ }

      const total = child.points?.total || 0;
      const labels = days.map(d => d.slice(5));

      content.innerHTML = `
        <div class="balance-card">
          <div class="balance-label">Saldo: ${escapeHtml(child.name || 'Dziecko')}</div>
          <div class="balance-amount">${formatPLN(total)}</div>
          <div class="balance-pts">${total} punktów</div>
        </div>

        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">Punkty (7 dni)</div><div class="stat-value green">${weekPts}</div></div>
          <div class="stat-card"><div class="stat-label">Granie (7 dni)</div><div class="stat-value purple">${formatMinutes(weekGaming)}</div></div>
          <div class="stat-card"><div class="stat-label">Wydano łącznie</div><div class="stat-value gold">${formatPLN(child.points?.spentAllTime || 0)}</div></div>
        </div>

        <div class="card" style="margin-bottom:16px">
          <h3 class="sec">🧹 Obowiązki domowe — do wypłaty</h3>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
            <div style="font-size:30px;font-weight:700;font-family:var(--mono);color:var(--accent2)">${choreOutstanding}</div>
            <div class="text2">${chorePts} pkt nierozliczone</div>
          </div>
          <div class="text2" style="margin-bottom:8px">Historia wypłat:</div>
          ${payoutSnap.empty ? '<p class="text2">Brak wypłat.</p>' : payoutSnap.docs.map(d => payoutRow(d.data())).join('')}
        </div>

        ${(moneyCurrent === null && goals.length === 0) ? '' : `
        <div class="card" style="margin-bottom:16px">
          <h3 class="sec">💰 Money — saldo i cele</h3>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
            <div style="font-size:30px;font-weight:700;font-family:var(--mono);color:var(--accent2)">${fmtMoney(moneyCurrent || 0)}</div>
            <div class="text2">saldo money trackera</div>
          </div>
          ${goals.length === 0 ? '<p class="text2">Brak celów.</p>' : goals.map(g => dashGoalRow(g, moneyCurrent, total)).join('')}
        </div>`}

        <div class="card" style="margin-bottom:16px">
          <h3 class="sec">Punkty — ostatnie 7 dni</h3>
          <div class="bar-chart">${barChart(ptsData, labels, 'var(--accent)')}</div>
        </div>
        <div class="card" style="margin-bottom:16px">
          <h3 class="sec">Czas grania — ostatnie 7 dni (min)</h3>
          <div class="bar-chart">${barChart(gamingData, labels, 'var(--accent2)')}</div>
        </div>

        <div class="card" style="margin-bottom:16px">
          <h3 class="sec">Ostatnie aktywności</h3>
          ${actSnap.empty ? '<p class="text2">Brak aktywności.</p>' : actSnap.docs.map(d => activityRow(d.data())).join('')}
        </div>
        <div class="card">
          <h3 class="sec">Ostatnie zakupy</h3>
          ${purSnap.empty ? '<p class="text2">Brak zakupów.</p>' : purSnap.docs.map(d => purchaseRow(d.data())).join('')}
        </div>`;

      // Grow bars from zero so the height transition plays.
      if (!prefersReduced()) requestAnimationFrame(() =>
        content.querySelectorAll('.bar').forEach(b => { b.style.height = b.dataset.h + 'px'; }));
    };

    function barChart(data, labels, color) {
      const max = Math.max(...data, 1);
      const reduce = prefersReduced();
      return data.map((v, i) => {
        const h = (v / max) * 100;
        const style = reduce ? `height:${h}px;background:${color}` : `height:0px;transition-delay:${i * 60}ms;background:${color}`;
        return `<div class="bar-col">
          <div class="bar-val">${v}</div>
          <div class="bar" style="${style}" data-h="${h}"></div>
          <div class="bar-label">${labels[i]}</div>
        </div>`;
      }).join('');
    }

    function activityRow(a) {
      const act = ACTIVITIES.find(x => x.value === a.type) || { label: a.type, color: '#6c63ff' };
      const date = new Date(a.timestamp?.toDate ? a.timestamp.toDate() : a.timestamp);
      const dateStr = date.toLocaleDateString('pl-PL', { day: 'numeric', month: 'short' });
      const desc = a.desc ? ' · ' + escapeHtml(a.desc) : '';
      return `<div class="activity-item">
        <div class="activity-icon" style="background:${act.color}22">${act.label.split(' ')[0]}</div>
        <div class="activity-info">
          <div class="activity-name">${act.label.replace(/^[^ ]+ /, '')}</div>
          <div class="activity-meta">${formatMinutes(a.duration)} · ${dateStr}${desc}</div>
        </div>
        <div class="activity-pts">+${a.points} pkt</div>
      </div>`;
    }

    function purchaseRow(p) {
      const date = new Date(p.timestamp?.toDate ? p.timestamp.toDate() : p.timestamp);
      const dateStr = date.toLocaleDateString('pl-PL', { day: 'numeric', month: 'short', year: 'numeric' });
      return `<div class="purchase-item">
        <div><div style="font-size:14px;font-weight:500">${escapeHtml(p.description)}</div><div class="text2">${dateStr}</div></div>
        <div style="text-align:right"><div style="font-weight:700;color:var(--warn)">-${p.pointsCost} pkt</div><div class="text2">${(p.amount).toFixed(2).replace('.', ',')} zł</div></div>
      </div>`;
    }

    const fmtMoney = (v) => (Number(v) || 0).toFixed(2).replace('.', ',') + ' zł';

    // Cel z dashboardu (users/{uid}.goals): typ 'money' mierzy saldo Money,
    // typ 'points' mierzy punkty LifeXP. Kwota docelowa to pole `amount`.
    function dashGoalRow(g, moneyCurrent, pointsTotal) {
      const isMoney = g.type === 'money';
      const cur = isMoney ? (moneyCurrent || 0) : (pointsTotal || 0);
      const target = g.amount || 1;
      const pct = Math.min(100, (cur / target) * 100);
      const done = cur >= target;
      const fmt = (n) => isMoney ? fmtMoney(n) : Math.round(n) + ' pkt';
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-weight:600;font-size:14px">🎯 ${escapeHtml(g.name || '')}${done ? ' ✅' : ''}</span>
          <span class="text2">${fmt(cur)} / ${fmt(target)} · ${pct.toFixed(0)}%</span>
        </div>
        <div class="pg-wrap"><div class="pg-bar" style="width:${pct}%${done ? ';background:var(--accent2)' : ''}"></div></div>
      </div>`;
    }

    function payoutRow(p) {
      const date = new Date(p.createdAt?.toDate ? p.createdAt.toDate() : p.createdAt);
      const dateStr = date.toLocaleDateString('pl-PL', { day: 'numeric', month: 'short', year: 'numeric' });
      const period = (p.fromISO && p.toISO)
        ? ` · za ${p.fromISO.slice(8)}.${p.fromISO.slice(5, 7)}–${p.toISO.slice(8)}.${p.toISO.slice(5, 7)}`
        : '';
      return `<div class="purchase-item">
        <div><div style="font-weight:700;font-family:var(--mono)">${(p.amountPln || 0).toFixed(2).replace('.', ',')} zł</div><div class="text2">${dateStr}${period}</div></div>
        <div class="text2" style="font-family:var(--mono)">${p.points} pkt</div>
      </div>`;
    }
  </script>
</body>
</html>
