<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeXP — Logowanie</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e0f13">
  <link rel="apple-touch-icon" href="icon.svg">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});</script>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 16px;
      animation: fadeUp .4s ease both;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .logo h1 span { color: var(--accent); }
    .logo p { color: var(--text2); font-size: 14px; margin-top: 4px; }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg3);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      background: transparent;
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }

    .tab.active {
      background: var(--bg2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }

    .btn-full { width: 100%; margin-top: 8px; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--text2);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
    }

    .error-msg {
      color: var(--warn);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <h1>Life<span>XP</span></h1>
      <p>Zarabiaj punkty. Odbieraj nagrody.</p>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Logowanie</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Rejestracja</div>
      </div>

      <!-- Login form -->
      <div id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" maxlength="254" placeholder="twoj@email.com">
        </div>
        <div class="form-group">
          <label>Hasło</label>
          <input type="password" id="login-password" maxlength="128" placeholder="••••••••">
        </div>
        <button class="btn-primary btn-full" onclick="loginEmail()">Zaloguj się</button>
      </div>

      <!-- Register form -->
      <div id="form-register" style="display:none">
        <div class="form-group">
          <label>Imię</label>
          <input type="text" id="reg-name" maxlength="30" placeholder="Szymon">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" maxlength="254" placeholder="twoj@email.com">
        </div>
        <div class="form-group">
          <label>Hasło (min. 6 znaków)</label>
          <input type="password" id="reg-password" maxlength="128" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Email rodzica (opcjonalne)</label>
          <input type="email" id="reg-parent-email" maxlength="254" placeholder="rodzic@email.com">
        </div>
        <button class="btn-primary btn-full" onclick="registerEmail()">Utwórz konto</button>
      </div>

      <div class="divider">lub</div>

      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M46.145 24.504c0-1.6-.144-3.136-.413-4.608H24v8.72h12.418c-.536 2.88-2.163 5.32-4.61 6.955v5.782h7.462c4.363-4.018 6.875-9.938 6.875-16.849z"/>
          <path fill="#34A853" d="M24 47c6.237 0 11.468-2.067 15.27-5.603l-7.462-5.782c-2.067 1.386-4.71 2.205-7.808 2.205-6.005 0-11.09-4.055-12.907-9.504H3.437v5.974C7.22 41.8 15.007 47 24 47z"/>
          <path fill="#FBBC05" d="M11.093 28.316A14.83 14.83 0 0 1 10.364 24c0-1.49.256-2.938.729-4.316v-5.974H3.437A22.99 22.99 0 0 0 1 24c0 3.713.89 7.228 2.437 10.29l7.656-5.974z"/>
          <path fill="#EA4335" d="M24 9.18c3.383 0 6.42 1.163 8.808 3.446l6.607-6.607C35.462 2.292 30.231 0 24 0 15.007 0 7.22 5.2 3.437 13.71l7.656 5.974C12.91 13.235 17.995 9.18 24 9.18z"/>
        </svg>
        Kontynuuj z Google
      </button>

      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <div id="toast"></div>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // Redirect if already logged in
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'app.html';
    });

    async function createUserProfile(user, extraData = {}) {
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          name: extraData.name || user.displayName || 'Użytkownik',
          email: user.email,
          parentEmail: extraData.parentEmail || '',
          createdAt: new Date().toISOString(),
          points: { total: 0, earnedAllTime: 0, spentAllTime: 0 },
          // Google/verified accounts are trusted; email+password must enter a code.
          emailVerified: user.emailVerified === true
        });
      }
    }

    window.switchTab = (tab) => {
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('error-msg').style.display = 'none';
    };

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function translateError(code) {
      const map = {
        'auth/user-not-found': 'Nie znaleziono konta z tym emailem.',
        'auth/wrong-password': 'Nieprawidłowe hasło.',
        'auth/invalid-credential': 'Nieprawidłowy email lub hasło.',
        'auth/email-already-in-use': 'Ten email jest już zajęty.',
        'auth/weak-password': 'Hasło musi mieć minimum 6 znaków.',
        'auth/invalid-email': 'Nieprawidłowy format emaila.',
        'auth/popup-closed-by-user': 'Okno logowania zostało zamknięte.',
      };
      return map[code] || 'Wystąpił błąd. Spróbuj ponownie.';
    }

    window.loginEmail = async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showError('Wypełnij wszystkie pola.');
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) { showError(translateError(e.code)); }
    };

    window.registerEmail = async () => {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const parentEmail = document.getElementById('reg-parent-email').value.trim();
      if (!name || !email || !password) return showError('Wypełnij wymagane pola.');
      if (password.length < 6) return showError('Hasło musi mieć minimum 6 znaków.');
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        await createUserProfile(cred.user, { name, parentEmail });
      } catch (e) { showError(translateError(e.code)); }
    };

    window.loginGoogle = async () => {
      try {
        const cred = await signInWithPopup(auth, googleProvider);
        await createUserProfile(cred.user);
      } catch (e) { showError(translateError(e.code)); }
    };
  </script>
</body>
</html>
