<!doctype html>
<!-- Minimal DOM shell for driving games.js directly, bypassing app.html's
     Firebase-gated auth flow. Mirrors exactly what setupCanvas()/rsBuildToolbar()
     etc. in games.js expect to find by element id. -->
<html>
<head>
  <meta charset="utf-8"><title>Redstone test harness</title>
  <style>
    /* Minimal subset of app.html's .games-canvas-row/.games-toolbar rules —
       needed so the canvas sits at a SANE, PREDICTABLE position during tests.
       Without this, the toolbar (a flex sibling of the canvas since the
       toolbar redesign) renders as an unstyled, unconstrained wide row of
       buttons, which can push the canvas far outside the viewport and cause
       Playwright to horizontally scroll the whole page when clicking a
       far-right button — silently breaking every test's tap-coordinate math
       (canvasRect()'s `left` becomes scroll-relative, not the stable value
       tests assume). Keep this in sync with app.html's real rules if that
       layout ever changes. */
    .games-canvas-row { display: flex; gap: 10px; align-items: stretch; }
    .games-toolbar { display: none; flex-direction: column; flex: none; width: 62px; gap: 5px; overflow-y: auto; }
    .games-toolbar button { display: flex; flex-direction: column; flex-shrink: 0; align-items: center; justify-content: center; gap: 3px; padding: 5px 2px; font-size: 8.5px; }
    /* Minimal subset of app.html's .modal-overlay/.modal rules — the Redstone
       settings panel (Sign/Repeater/Comparator) is a real .modal-overlay
       appended to <body> (see rsBuildPanel in games.js). Without position:
       fixed + z-index here, it renders inline in normal document flow instead
       of floating above the canvas, so on a big enough canvas (e.g. once
       Redstone auto-opens fullscreen) the canvas visually overlaps and
       intercepts clicks meant for the panel's buttons — passed by coincidence
       before only because the small non-fullscreen canvas didn't happen to
       overlap it. Keep in sync with style.css if that pattern changes. */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 2100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1b22; padding: 20px; width: 100%; max-width: 440px; margin: 16px; }
  </style>
</head>
<body>
  <div id="page-games" class="active">
    <div id="games-menu" style="display:none"></div>
    <div id="games-play" style="display:block">
      <button id="games-fs-enter">fs</button>
      <button id="games-fs-exit">x</button>
      <div class="games-play-head">
        <h3 id="games-play-title"></h3>
        <span>Score: <strong id="games-score">0</strong></span>
        <span>Best: <strong id="games-best">0</strong></span>
      </div>
      <div class="games-canvas-row">
        <div id="games-toolbar" class="games-toolbar" style="display:none"></div>
        <canvas id="games-canvas" width="600" height="600"></canvas>
      </div>
      <p id="games-hint"></p>
    </div>
  </div>

  <script>
    // games.js calls the real app.html confirmDialog() (exposed on window)
    // for "Clear world" — stub it here so tests don't need the real modal.
    window.confirmDialog = () => Promise.resolve(true);
  </script>
  <script src="../../games.js"></script>
  <script>
    window.__rsReady = new Promise((resolve) => {
      (function check() {
        if (window.LifeXPGames) resolve(); else setTimeout(check, 10);
      })();
    });
  </script>
</body>
</html>
