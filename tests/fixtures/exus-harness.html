<!doctype html>
<!-- Standalone harness for the Ex-us/Siri-ous chat toggle. app.html's real
     module script is unreachable in sandboxed test runs (it imports Firebase
     directly from gstatic.com, and the sandbox's egress policy blocks that
     host), so this harness inlines the EXACT extracted CSS/HTML/JS for the
     feature (see tests/exus-smoke.spec.js for the extraction) plus a
     minimal httpsCallable/functions stub, to drive the real markup/logic
     without a live Firebase backend. -->
<html>
<head>
<meta charset="utf-8"><title>Ex-us harness</title>
<link rel="stylesheet" href="../../style.css">
<style>
    /* ── Przełącznik Siri-ous / Ex-us — "kropki jak zakładki przeglądarki".
       Aktywna kropka rozwinięta (pełna nazwa), nieaktywna skurczona do
       pierwszej litery; kliknięcie skurczonej rozwija ją z animacją.
       Neutralny wobec obu modułów, więc żyje poza namespace'ami .aic-*/.exus-*. */
    .aichat-switch {
      position: relative; z-index: 2;
      display: flex; justify-content: center; gap: 8px;
      padding: 4px 4px 12px;
    }
    .aichat-switch-pill {
      display: flex; align-items: center; gap: 6px;
      height: 34px; padding: 0 16px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text2); cursor: pointer;
      font-size: 13px; font-weight: 700; letter-spacing: .2px;
      transition: background .3s ease, color .3s ease, padding .35s cubic-bezier(.4,0,.2,1),
        box-shadow .3s ease, border-color .3s ease;
      overflow: hidden; white-space: nowrap;
    }
    .aichat-switch-pill.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,.22);
    }
    .aichat-switch-pill:not(.active) { padding: 0; width: 34px; justify-content: center; }
    .aichat-switch-letter { font-size: 14px; flex-shrink: 0; }
    .aichat-switch-label {
      max-width: 100px; opacity: 1; overflow: hidden;
      transition: max-width .3s ease .05s, opacity .2s ease;
    }
    .aichat-switch-pill:not(.active) .aichat-switch-label {
      max-width: 0; opacity: 0; transition: max-width .3s ease, opacity .1s ease;
    }

    /* ── "Ex-us" — prawdziwy asystent AI (Gemini, przez Cloud Function
       aiAssistantPing), współdzielący zakładkę z Siri-ous wyżej. W
       PRZECIWIEŃSTWIE do Siri-ous, świadomie używa var(--bg)/var(--text)/
       var(--accent) itd. reszty apki (patrz style.css :root i body.theme-*),
       więc dynamicznie dopasowuje się do aktywnego motywu — zero kolorów
       na sztywno. */
    .exus-shell {
      position: relative; z-index: 1;
      max-width: 460px; margin: 0 auto;
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 1px 3px rgba(0,0,0,.08);
      display: flex; flex-direction: column;
      height: calc(100vh - 190px); min-height: 380px; overflow: hidden;
    }
    .exus-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    /* Wirujący gradientowy pierścień wokół avatara — "AI-owy" akcent,
       zbudowany z var(--accent)/var(--accent2), więc też podąża za motywem. */
    .exus-avatar-ring {
      width: 42px; height: 42px; border-radius: 50%; padding: 2px; flex-shrink: 0;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      animation: exusRingSpin 4s linear infinite;
    }
    @keyframes exusRingSpin { to { transform: rotate(360deg); } }
    .exus-avatar {
      width: 100%; height: 100%; border-radius: 50%; background: var(--bg2);
      display: flex; align-items: center; justify-content: center; font-size: 19px; color: var(--accent);
    }
    .exus-header-text { flex: 1; min-width: 0; }
    .exus-title { font-size: 16px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .exus-title-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
      padding: 2px 6px; border-radius: 999px; background: var(--accent); color: #fff;
    }
    .exus-subtitle { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .exus-limitbar-wrap { padding: 0 18px 12px; flex-shrink: 0; }
    .exus-limitbar-label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11px; color: var(--text2); margin-bottom: 5px;
    }
    .exus-limitbar-label span:last-child { font-weight: 700; color: var(--text); }
    .exus-limitbar-track { height: 6px; border-radius: 999px; background: var(--bg3); overflow: hidden; }
    .exus-limitbar-fill {
      height: 100%; border-radius: 999px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .5s cubic-bezier(.4,0,.2,1), background .3s ease;
    }
    .exus-limitbar-sub { font-size: 10.5px; color: var(--text2); margin-top: 4px; }
    .exus-messages {
      flex: 1; min-height: 0; overflow-y: auto; scroll-behavior: smooth;
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .exus-empty { text-align: center; color: var(--text2); font-size: 13px; margin-top: 30px; }
    .exus-row { display: flex; }
    .exus-row.user { justify-content: flex-end; }
    .exus-row.ai { justify-content: flex-start; }
    .exus-bubble {
      max-width: 80%; min-width: 0; padding: 10px 15px; border-radius: 18px;
      font-size: 14.5px; line-height: 1.45; word-wrap: break-word; overflow-wrap: break-word;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .exus-bubble.pop { animation: exusPop .28s cubic-bezier(.2,.8,.3,1) both; }
    @keyframes exusPop {
      from { opacity: 0; transform: translateY(8px) scale(.96); filter: blur(2px); }
      to { opacity: 1; transform: none; filter: none; }
    }
    .exus-row.user .exus-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
    .exus-row.ai .exus-bubble {
      background: var(--bg3); color: var(--text); border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }
    .exus-typing { display: flex; gap: 4px; padding: 12px 15px; }
    .exus-typing span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: exusBounce 1.1s ease-in-out infinite;
    }
    .exus-typing span:nth-child(2) { animation-delay: .15s; }
    .exus-typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes exusBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .exus-inputbar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .exus-inputbar input {
      flex: 1; min-width: 0; border: 1px solid var(--border); background: var(--bg3);
      border-radius: 20px; padding: 11px 16px; font-size: 14.5px; color: var(--text); outline: none;
      transition: border-color .2s ease;
    }
    .exus-inputbar input:focus { border-color: var(--accent); }
    .exus-inputbar input::placeholder { color: var(--text2); }
    .exus-send {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; flex-shrink: 0;
      transition: transform .12s ease, box-shadow .2s ease;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }
    .exus-send:active { transform: scale(.9); }
    .exus-send:hover { box-shadow: 0 4px 16px rgba(0,0,0,.28); }

</style>
</head>
<body>
  <div class="page active" id="page-ai-chat">
        <!-- Przełącznik Siri-ous / Ex-us — "kropki" jak zakładki przeglądarki:
             aktywna jest rozwinięta (pełna nazwa), nieaktywna skurczona do
             pierwszej litery. Patrz switchAiAssistant() w JS niżej. -->
        <div class="aichat-switch">
          <button class="aichat-switch-pill active" id="aichat-pill-siri" onclick="switchAiAssistant('siri')">
            <span class="aichat-switch-letter">S</span><span class="aichat-switch-label">Siri-ous</span>
          </button>
          <button class="aichat-switch-pill" id="aichat-pill-exus" onclick="switchAiAssistant('exus')">
            <span class="aichat-switch-letter">E</span><span class="aichat-switch-label">Ex-us</span>
          </button>
        </div>

        <div class="aic-shell" id="aic-shell">
          <div class="aic-header">
            <div class="aic-avatar" id="aic-avatar">🤖</div>
            <div class="aic-header-text" onclick="aicOpenChatList()">
              <div class="aic-title">Siri-ous AI</div>
              <div class="aic-chat-title"><span id="aic-chat-title-text">Czat 1</span> <i class="ti ti-chevron-down"></i></div>
            </div>
            <button class="aic-newchat-btn" onclick="aicNewChat()" aria-label="Nowy czat"><i class="ti ti-plus"></i></button>
          </div>
          <div class="aic-messages" id="aic-messages"></div>
          <!-- Chipsy z podpowiedziami — widoczne tylko dla PUSTEGO czatu (jak w
               prawdziwych apkach AI), chowane po pierwszej wiadomości (patrz
               aicRenderMessages). Każdy chip od razu WYSYŁA swoje pytanie. -->
          <div class="aic-chips" id="aic-chips">
            <button class="aic-chip" onclick="aicSendChip('Jaka jest dziś pogoda?')">🌤️ Pogoda</button>
            <button class="aic-chip" onclick="aicSendChip('Napisz mi kod')">💻 Kod</button>
            <button class="aic-chip" onclick="aicSendChip('Co dziś zjeść?')">🍝 Jedzenie</button>
            <button class="aic-chip" onclick="aicSendChip('Zagraj mi jakąś piosenkę')">🎵 Muzyka</button>
            <button class="aic-chip" onclick="aicSendChip('Kto wygra dzisiejszy mecz?')">⚽ Sport</button>
            <button class="aic-chip" onclick="aicSendChip('Kocham Cię')">❤️ Miłość</button>
            <button class="aic-chip" onclick="aicSendChip('Policz mi coś trudnego')">🔢 Matematyka</button>
            <button class="aic-chip" onclick="aicSendChip('Kim jestem?')">🤔 Kim jestem?</button>
          </div>
          <div class="aic-inputbar">
            <input type="text" id="aic-input" placeholder="Zapytaj o cokolwiek..." maxlength="300" onkeydown="if(event.key==='Enter')sendAicMessage()">
            <button class="aic-send" onclick="sendAicMessage()" aria-label="Wyślij"><i class="ti ti-arrow-up"></i></button>
          </div>
        </div>

        <!-- EX-US — prawdziwy asystent AI (Gemini, przez Cloud Function
             aiAssistantPing). W przeciwieństwie do Siri-ous, kolorystyka
             korzysta z var(--bg)/var(--accent) itd. reszty apki (patrz
             .exus-* w <style>), więc dopasowuje się automatycznie do
             aktywnego motywu (lifexp/apple/gold). -->
        <div class="exus-shell" id="exus-shell" style="display:none">
          <div class="exus-header">
            <div class="exus-avatar-ring"><div class="exus-avatar" id="exus-avatar">✦</div></div>
            <div class="exus-header-text">
              <div class="exus-title">Ex-us <span class="exus-title-badge">AI</span></div>
              <div class="exus-subtitle">Prawdziwy asystent LifeXP</div>
            </div>
          </div>
          <div class="exus-limitbar-wrap">
            <div class="exus-limitbar-label"><span>Dzienny limit tokenów</span><span id="exus-limit-pct">—</span></div>
            <div class="exus-limitbar-track"><div class="exus-limitbar-fill" id="exus-limit-fill"></div></div>
            <div class="exus-limitbar-sub" id="exus-limit-sub">Wyślij wiadomość, żeby zobaczyć zużycie.</div>
          </div>
          <div class="exus-messages" id="exus-messages"></div>
          <div class="exus-inputbar">
            <input type="text" id="exus-input" placeholder="Napisz do Ex-us..." maxlength="1000" onkeydown="if(event.key==='Enter')sendExusMessage()">
            <button class="exus-send" onclick="sendExusMessage()" aria-label="Wyślij"><i class="ti ti-arrow-up"></i></button>
          </div>
        </div>

        <!-- Lista czatów (tworzenie/usuwanie) — otwierana tapnięciem tytułu czatu w nagłówku. -->
        <div class="aic-chatlist-overlay" id="aic-chatlist-overlay" onclick="if(event.target===this)aicCloseChatList()">
          <div class="aic-chatlist-panel">
            <div class="aic-chatlist-header">
              <span>Twoje czaty</span>
              <button class="aic-chatlist-close" onclick="aicCloseChatList()" aria-label="Zamknij"><i class="ti ti-x"></i></button>
            </div>
            <div class="aic-chatlist-items" id="aic-chatlist-items"></div>
            <button class="aic-chatlist-new" onclick="aicNewChat()"><i class="ti ti-plus"></i> Nowy czat</button>
          </div>
        </div>

  </div>

  <script>
    // ── Stubs standing in for the real Firebase module + Siri-ous helpers ──
    window.__exusMock = { mode: 'success', data: {} };
    window.httpsCallable = function (_functions, _name) {
      return function () {
        const cfg = window.__exusMock;
        if (cfg.mode === 'error') {
          const err = new Error(cfg.errorMessage || 'internal error');
          err.code = cfg.errorCode || 'functions/internal';
          return Promise.reject(err);
        }
        return Promise.resolve({ data: cfg.data });
      };
    };
    window.functions = {};
    var functions = window.functions;
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    // Minimal stand-in for applyTheme() in app.html (same class-toggle mechanism).
    window.applyTheme = function (name) {
      document.body.classList.remove('theme-apple', 'theme-gold');
      if (name === 'apple') document.body.classList.add('theme-apple');
      if (name === 'gold') document.body.classList.add('theme-gold');
    };
  </script>
  <script>
    // ── "Ex-us" — prawdziwy asystent AI (Gemini, przez Cloud Function
    // aiAssistantPing) współdzielący zakładkę z Siri-ous wyżej. Na razie
    // wywołuje istniejący ping (status/limit), nie generuje jeszcze
    // prawdziwych odpowiedzi tekstowych — patrz komentarz w sendExusMessage.
    // httpsCallable/functions pochodzą z importu przy TYMCZASOWY TEST AI
    // na górze pliku.
    const EXUS_HISTORY_KEY = 'lifexp-exus-history';
    const AICHAT_ACTIVE_KEY = 'lifexp-aichat-active';
    let exusMessages = [];

    function exusSaveHistory() {
      try { localStorage.setItem(EXUS_HISTORY_KEY, JSON.stringify(exusMessages)); } catch (_) {}
    }

    function exusLoadHistory() {
      try { exusMessages = JSON.parse(localStorage.getItem(EXUS_HISTORY_KEY)) || []; } catch (_) { exusMessages = []; }
    }

    function exusRenderMessages(animateLast) {
      const el = document.getElementById('exus-messages');
      if (!el) return;
      if (!exusMessages.length) {
        el.innerHTML = '<p class="exus-empty">Napisz coś do Ex-us — prawdziwego asystenta AI LifeXP.</p>';
        return;
      }
      el.innerHTML = exusMessages.map((m, i) => {
        const isLast = i === exusMessages.length - 1;
        const popClass = (animateLast && isLast) ? ' pop' : '';
        return `<div class="exus-row ${m.role}"><div class="exus-bubble${popClass}">${escapeHtml(m.text)}</div></div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
    }

    // Zasila pasek limitu prawdziwymi danymi z odpowiedzi aiAssistantPing
    // (tokensUsedToday/tokensLimitDaily/remainingPercent).
    function exusUpdateLimitBar(d) {
      const fill = document.getElementById('exus-limit-fill');
      const pct = document.getElementById('exus-limit-pct');
      const sub = document.getElementById('exus-limit-sub');
      if (!d || typeof d.remainingPercent !== 'number') return;
      const pctVal = Math.max(0, Math.min(100, d.remainingPercent));
      if (fill) {
        fill.style.width = pctVal + '%';
        fill.style.background = pctVal < 20
          ? 'var(--warn)'
          : 'linear-gradient(90deg, var(--accent), var(--accent2))';
      }
      if (pct) pct.textContent = Math.round(pctVal) + '% pozostało';
      if (sub) sub.textContent = (d.tokensUsedToday ?? '—') + ' / ' + (d.tokensLimitDaily ?? '—') + ' tokenów dziennie';
    }

    function loadExusChat() {
      exusLoadHistory();
      exusRenderMessages(false);
    }

    // Przełącznik Siri-ous / Ex-us — pill-toggle "kropki jak zakładki
    // przeglądarki": aktywna rozwinięta, nieaktywna skurczona do litery.
    window.switchAiAssistant = (which) => {
      try { localStorage.setItem(AICHAT_ACTIVE_KEY, which); } catch (_) {}
      const aicShell = document.getElementById('aic-shell');
      const exusShell = document.getElementById('exus-shell');
      if (aicShell) aicShell.style.display = which === 'exus' ? 'none' : 'flex';
      if (exusShell) exusShell.style.display = which === 'exus' ? 'flex' : 'none';
      const siriPill = document.getElementById('aichat-pill-siri');
      const exusPill = document.getElementById('aichat-pill-exus');
      if (siriPill) siriPill.classList.toggle('active', which !== 'exus');
      if (exusPill) exusPill.classList.toggle('active', which === 'exus');
    };

    window.sendExusMessage = async () => {
      const input = document.getElementById('exus-input');
      const text = input.value.trim();
      if (!text) return;
      exusMessages.push({ role: 'user', text });
      exusSaveHistory();
      exusRenderMessages(true);
      input.value = '';

      const el = document.getElementById('exus-messages');
      const typingId = 'exus-typing-' + Date.now();
      el.insertAdjacentHTML('beforeend',
        `<div class="exus-row ai" id="${typingId}"><div class="exus-bubble exus-typing"><span></span><span></span><span></span></div></div>`);
      el.scrollTop = el.scrollHeight;

      // Na razie woła aiAssistantPing (sprawdza dostęp/limit) zamiast
      // prawdziwego modelu Gemini — podłączenie faktycznej odpowiedzi AI to
      // osobne zadanie. Ping i tak zwraca realne dane licznika, którymi od
      // razu zasilamy pasek limitu powyżej.
      let replyText;
      try {
        const ping = httpsCallable(functions, 'aiAssistantPing');
        const res = await ping();
        const d = res.data || {};
        exusUpdateLimitBar(d);
        replyText = 'Cześć, tu Ex-us' + (d.modelWouldBe ? ' (' + d.modelWouldBe + ')' : '') +
          '. To na razie test połączenia z limitem tokenów — prawdziwe odpowiedzi AI podłączymy w kolejnym kroku. Status: ' + d.status + '.';
      } catch (err) {
        replyText = 'Nie udało się połączyć z Ex-us. Kod błędu: ' + (err.code || '?') + ' — ' + (err.message || 'nieznany błąd.');
      }

      const typingEl = document.getElementById(typingId);
      if (typingEl) typingEl.remove();
      exusMessages.push({ role: 'ai', text: replyText });
      exusSaveHistory();
      exusRenderMessages(true);
    };

  </script>
  <script>
    // Mirrors app.html's loadAiChat() initial call (fired by the real
    // showPage('ai-chat') hook) — loads history and sets the default tab.
    loadExusChat();
    switchAiAssistant('siri');
  </script>
</body>
</html>
