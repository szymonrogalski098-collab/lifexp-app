<!doctype html>
<!-- Standalone harness for the Ex-us/Siri-ous chat toggle. app.html's real
     module script is unreachable in sandboxed test runs (it imports Firebase
     directly from gstatic.com, and the sandbox's egress policy blocks that
     host), so this harness inlines the EXACT extracted CSS/HTML/JS for the
     feature (see tests/exus-smoke.spec.js for the extraction) plus a
     minimal httpsCallable/functions stub, to drive the real markup/logic
     without a live Firebase backend. -->
<html>
<head>
<meta charset="utf-8"><title>Ex-us harness</title>
<link rel="stylesheet" href="../../style.css">
<style>
    /* ── Karta czatu (Siri-ous / Ex-us) — wspólny wrapper tylko po to, żeby
       przełącznik "kropek" siadał BEZPOŚREDNIO nad oknem czatu jako jego
       nagłówek (zero odstępu), zamiast być osobnym elementem gdzieś nad nim. */
    .aichat-card {
      position: relative; z-index: 1;
      max-width: 460px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
    }
    /* ── Przełącznik Siri-ous / Ex-us — "kropki jak zakładki przeglądarki",
       stopione w JEDNĄ pigułkę (stykają się bokami, zero odstępu — kontener
       ma zaokrąglenie i overflow:hidden, przyciski w środku są bez własnego
       border-radius). Aktywna kropka rozwinięta (pełna nazwa), nieaktywna
       skurczona do pierwszej litery; kliknięcie skurczonej rozwija ją z
       animacją. Siada bezpośrednio na górnej krawędzi karty czatu (margin-bottom
       ujemny), więc wygląda jak zakładka wystająca z nagłówka okna poniżej. */
    .aichat-switch {
      position: relative; z-index: 2;
      display: inline-flex;
      border-radius: 999px; overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: -1px;
      flex-shrink: 0;
    }
    .aichat-switch-pill {
      display: flex; align-items: center; gap: 6px;
      height: 34px; padding: 0 16px; border: none;
      background: var(--bg3); color: var(--text2); cursor: pointer;
      font-size: 13px; font-weight: 700; letter-spacing: .2px;
      transition: background .3s ease, color .3s ease, padding .35s cubic-bezier(.4,0,.2,1);
      overflow: hidden; white-space: nowrap;
    }
    .aichat-switch-pill.active { background: var(--accent); color: #fff; }
    .aichat-switch-pill:not(.active) { padding: 0; width: 34px; justify-content: center; }
    .aichat-switch-letter { font-size: 14px; flex-shrink: 0; }
    .aichat-switch-label {
      max-width: 100px; opacity: 1; overflow: hidden;
      transition: max-width .3s ease .05s, opacity .2s ease;
    }
    .aichat-switch-pill:not(.active) .aichat-switch-label {
      max-width: 0; opacity: 0; transition: max-width .3s ease, opacity .1s ease;
    }

    /* ── "Ex-us" — prawdziwy asystent AI (Gemini, przez Cloud Function
       aiAssistantPing), współdzielący zakładkę z Siri-ous wyżej. W
       PRZECIWIEŃSTWIE do Siri-ous, świadomie używa var(--bg)/var(--text)/
       var(--accent) itd. reszty apki (patrz style.css :root i body.theme-*),
       więc dynamicznie dopasowuje się do aktywnego motywu — zero kolorów
       na sztywno. */
    .exus-shell {
      position: relative; z-index: 1;
      max-width: 460px; margin: 0 auto;
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 1px 3px rgba(0,0,0,.08);
      display: flex; flex-direction: column;
      height: calc(100vh - 190px); min-height: 380px; overflow: hidden;
    }
    .exus-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    /* Wirujący gradientowy pierścień wokół avatara — "AI-owy" akcent,
       zbudowany z var(--accent)/var(--accent2), więc też podąża za motywem. */
    .exus-avatar-ring {
      width: 42px; height: 42px; border-radius: 50%; padding: 2px; flex-shrink: 0;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      animation: exusRingSpin 4s linear infinite;
    }
    @keyframes exusRingSpin { to { transform: rotate(360deg); } }
    .exus-avatar {
      width: 100%; height: 100%; border-radius: 50%; background: var(--bg2);
      display: flex; align-items: center; justify-content: center; font-size: 19px; color: var(--accent);
    }
    .exus-header-text { flex: 1; min-width: 0; }
    .exus-title { font-size: 16px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .exus-title-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
      padding: 2px 6px; border-radius: 999px; background: var(--accent); color: #fff;
    }
    .exus-subtitle { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .exus-newchat-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      background: var(--bg3); color: var(--accent); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: transform .12s ease, background .2s ease;
    }
    .exus-newchat-btn:active { transform: scale(.9); }
    .exus-newchat-btn:hover { background: var(--border); }
    .exus-limitbar-wrap { padding: 0 18px 12px; flex-shrink: 0; }
    .exus-limitbar-label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11px; color: var(--text2); margin-bottom: 5px;
    }
    .exus-limitbar-label span:last-child { font-weight: 700; color: var(--text); }
    .exus-limitbar-track { height: 6px; border-radius: 999px; background: var(--bg3); overflow: hidden; }
    .exus-limitbar-fill {
      height: 100%; border-radius: 999px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .5s cubic-bezier(.4,0,.2,1), background .3s ease;
    }
    .exus-limitbar-sub { font-size: 10.5px; color: var(--text2); margin-top: 4px; }
    .exus-messages {
      flex: 1; min-height: 0; overflow-y: auto; scroll-behavior: smooth;
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .exus-empty { text-align: center; color: var(--text2); font-size: 13px; margin-top: 30px; }
    .exus-row { display: flex; }
    .exus-row.user { justify-content: flex-end; }
    .exus-row.ai { justify-content: flex-start; }
    .exus-bubble {
      max-width: 80%; min-width: 0; padding: 10px 15px; border-radius: 18px;
      font-size: 14.5px; line-height: 1.45; word-wrap: break-word; overflow-wrap: break-word;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .exus-bubble.pop { animation: exusPop .28s cubic-bezier(.2,.8,.3,1) both; }
    @keyframes exusPop {
      from { opacity: 0; transform: translateY(8px) scale(.96); filter: blur(2px); }
      to { opacity: 1; transform: none; filter: none; }
    }
    .exus-row.user .exus-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
    .exus-row.ai .exus-bubble {
      background: var(--bg3); color: var(--text); border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }
    /* Komunikaty systemowe (błędy z backendu — np. wyczerpany limit tokenów) —
       wyśrodkowane, odróżnione kolorem ostrzegawczym od zwykłych dymków AI. */
    .exus-row.system { justify-content: center; }
    .exus-row.system .exus-bubble {
      background: var(--bg3); border: 1px solid var(--warn); color: var(--warn);
      font-size: 13px; text-align: center; max-width: 90%;
    }
    /* Karta propozycji zadania (aiClassifyIntent → intent:"task") — dymek AI,
       ale z własnym układem zamiast zwykłego tekstu: nagłówek, tytuł, meta
       (godzina/czas/typ) i dwa przyciski Zatwierdź/Odrzuć. Po decyzji karta
       zamienia się w zwykły tekstowy dymek (patrz exusConfirmProposal/
       exusRejectProposal w JS). Karta celu poniżej (.exus-proposal-*
       reużyte) jest analogiczna, dla intent:"goal". */
    .exus-proposal { max-width: 88%; padding: 12px 14px; }
    .exus-proposal-head {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
      color: var(--accent); margin-bottom: 6px;
    }
    .exus-proposal-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .exus-proposal-meta {
      display: flex; flex-wrap: wrap; gap: 10px;
      font-size: 12px; color: var(--text2); margin-bottom: 12px;
    }
    .exus-proposal-meta span { display: flex; align-items: center; gap: 4px; }
    .exus-proposal-actions { display: flex; gap: 8px; }
    .exus-proposal-btn {
      flex: 1; border: none; border-radius: 10px; padding: 9px 0;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .15s ease, transform .12s ease;
    }
    .exus-proposal-btn:active { transform: scale(.96); }
    .exus-proposal-btn:disabled { opacity: .5; cursor: default; transform: none; }
    .exus-proposal-btn.confirm { background: var(--accent); color: #fff; }
    .exus-proposal-btn.reject { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }
    .exus-typing { display: flex; gap: 4px; padding: 12px 15px; }
    .exus-typing span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: exusBounce 1.1s ease-in-out infinite;
    }
    .exus-typing span:nth-child(2) { animation-delay: .15s; }
    .exus-typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes exusBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .exus-inputbar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .exus-inputbar input {
      flex: 1; min-width: 0; border: 1px solid var(--border); background: var(--bg3);
      border-radius: 20px; padding: 11px 16px; font-size: 14.5px; color: var(--text); outline: none;
      transition: border-color .2s ease;
    }
    .exus-inputbar input:focus { border-color: var(--accent); }
    .exus-inputbar input::placeholder { color: var(--text2); }
    .exus-send {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; flex-shrink: 0;
      transition: transform .12s ease, box-shadow .2s ease;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }
    .exus-send:active { transform: scale(.9); }
    .exus-send:hover { box-shadow: 0 4px 16px rgba(0,0,0,.28); }

</style>
</head>
<body>
  <div class="page active" id="page-ai-chat">
      <div class="aichat-card">
        <!-- Przełącznik Siri-ous / Ex-us — jedna zrośnięta pigułka (kropki
             stykają się bokami, zero odstępu) siedząca bezpośrednio na górnej
             krawędzi karty czatu poniżej, jako jej nagłówek — jak zakładka
             przeglądarki wystająca z okna. Aktywna kropka jest rozwinięta
             (pełna nazwa), nieaktywna skurczona do pierwszej litery. Patrz
             switchAiAssistant() w JS niżej. -->
        <div class="aichat-switch">
          <button class="aichat-switch-pill active" id="aichat-pill-siri" onclick="switchAiAssistant('siri')"><span class="aichat-switch-letter">S</span><span class="aichat-switch-label">Siri-ous</span></button><button class="aichat-switch-pill" id="aichat-pill-exus" onclick="switchAiAssistant('exus')"><span class="aichat-switch-letter">E</span><span class="aichat-switch-label">Ex-us</span></button>
        </div>

        <div class="aic-shell" id="aic-shell">
          <div class="aic-header">
            <div class="aic-avatar" id="aic-avatar">🤖</div>
            <div class="aic-header-text" onclick="aicOpenChatList()">
              <div class="aic-title">Siri-ous AI</div>
              <div class="aic-chat-title"><span id="aic-chat-title-text">Czat 1</span> <i class="ti ti-chevron-down"></i></div>
            </div>
            <button class="aic-newchat-btn" onclick="aicNewChat()" aria-label="Nowy czat"><i class="ti ti-plus"></i></button>
          </div>
          <div class="aic-messages" id="aic-messages"></div>
          <!-- Chipsy z podpowiedziami — widoczne tylko dla PUSTEGO czatu (jak w
               prawdziwych apkach AI), chowane po pierwszej wiadomości (patrz
               aicRenderMessages). Każdy chip od razu WYSYŁA swoje pytanie. -->
          <div class="aic-chips" id="aic-chips">
            <button class="aic-chip" onclick="aicSendChip('Jaka jest dziś pogoda?')">🌤️ Pogoda</button>
            <button class="aic-chip" onclick="aicSendChip('Napisz mi kod')">💻 Kod</button>
            <button class="aic-chip" onclick="aicSendChip('Co dziś zjeść?')">🍝 Jedzenie</button>
            <button class="aic-chip" onclick="aicSendChip('Zagraj mi jakąś piosenkę')">🎵 Muzyka</button>
            <button class="aic-chip" onclick="aicSendChip('Kto wygra dzisiejszy mecz?')">⚽ Sport</button>
            <button class="aic-chip" onclick="aicSendChip('Kocham Cię')">❤️ Miłość</button>
            <button class="aic-chip" onclick="aicSendChip('Policz mi coś trudnego')">🔢 Matematyka</button>
            <button class="aic-chip" onclick="aicSendChip('Kim jestem?')">🤔 Kim jestem?</button>
          </div>
          <div class="aic-inputbar">
            <input type="text" id="aic-input" placeholder="Zapytaj o cokolwiek..." maxlength="300" onkeydown="if(event.key==='Enter')sendAicMessage()">
            <button class="aic-send" onclick="sendAicMessage()" aria-label="Wyślij"><i class="ti ti-arrow-up"></i></button>
          </div>
        </div>

        <!-- EX-US — prawdziwy asystent AI (Gemini, przez Cloud Function
             aiAssistantPing). W przeciwieństwie do Siri-ous, kolorystyka
             korzysta z var(--bg)/var(--accent) itd. reszty apki (patrz
             .exus-* w <style>), więc dopasowuje się automatycznie do
             aktywnego motywu (lifexp/apple/gold). -->
        <div class="exus-shell" id="exus-shell" style="display:none">
          <div class="exus-header">
            <div class="exus-avatar-ring"><div class="exus-avatar" id="exus-avatar">✦</div></div>
            <div class="exus-header-text">
              <div class="exus-title">Ex-us <span class="exus-title-badge">AI</span></div>
              <div class="exus-subtitle">Prawdziwy asystent LifeXP</div>
            </div>
            <button class="exus-newchat-btn" onclick="exusNewConversation()" aria-label="Nowa rozmowa"><i class="ti ti-plus"></i></button>
          </div>
          <div class="exus-limitbar-wrap">
            <div class="exus-limitbar-label"><span>Dzienny limit tokenów</span><span id="exus-limit-pct">—</span></div>
            <div class="exus-limitbar-track"><div class="exus-limitbar-fill" id="exus-limit-fill"></div></div>
            <div class="exus-limitbar-sub" id="exus-limit-sub">Wyślij wiadomość, żeby zobaczyć zużycie.</div>
          </div>
          <div class="exus-messages" id="exus-messages"></div>
          <div class="exus-inputbar">
            <input type="text" id="exus-input" placeholder="Napisz do Ex-us..." maxlength="1000" onkeydown="if(event.key==='Enter')sendExusMessage()">
            <button class="exus-send" onclick="sendExusMessage()" aria-label="Wyślij"><i class="ti ti-arrow-up"></i></button>
          </div>
        </div>
      </div>

        <!-- Lista czatów (tworzenie/usuwanie) — otwierana tapnięciem tytułu czatu w nagłówku. -->
        <div class="aic-chatlist-overlay" id="aic-chatlist-overlay" onclick="if(event.target===this)aicCloseChatList()">
          <div class="aic-chatlist-panel">
            <div class="aic-chatlist-header">
              <span>Twoje czaty</span>
              <button class="aic-chatlist-close" onclick="aicCloseChatList()" aria-label="Zamknij"><i class="ti ti-x"></i></button>
            </div>
            <div class="aic-chatlist-items" id="aic-chatlist-items"></div>
            <button class="aic-chatlist-new" onclick="aicNewChat()"><i class="ti ti-plus"></i> Nowy czat</button>
          </div>
        </div>

  </div>

  <!-- Fake Planer dnia / Dashboard pages, just enough for the
       .classList.contains('active') guards in exusConfirmProposal()/
       exusConfirmGoalProposal() to find, and for loadPlanner()/renderGoal()
       (stubbed below) to be callable by name. Toggle class="page active" on
       either from a test to exercise the "page is open -> refresh it" branch. -->
  <div class="page" id="page-planner"></div>
  <div class="page" id="page-dashboard"></div>

  <script>
    // ── Stubs standing in for the real Firebase module + Siri-ous helpers ──
    // Independent mock configs, keyed by callable name, since sendExusMessage
    // now calls aiClassifyIntent (always), then either aiAssistantChat, or
    // (via a proposal card) aiConfirmTask/aiConfirmGoal, then aiAssistantPing.
    window.__exusMock = {
      aiClassifyIntent: { mode: 'success', data: { status: 'ok', intent: 'chat' } },
      aiAssistantChat: { mode: 'success', data: {} },
      aiConfirmTask: { mode: 'success', data: { status: 'ok', taskId: 'task-1' } },
      aiConfirmGoal: { mode: 'success', data: { status: 'ok', goalId: 'goal-1' } },
      aiAssistantPing: { mode: 'success', data: {} },
    };
    window.httpsCallable = function (_functions, name) {
      return function (arg) {
        const cfg = window.__exusMock[name] || { mode: 'success', data: {} };
        cfg.lastArg = arg;
        cfg.calls = (cfg.calls || 0) + 1;
        if (cfg.mode === 'error') {
          const err = new Error(cfg.errorMessage || 'internal error');
          err.code = cfg.errorCode || 'functions/internal';
          return Promise.reject(err);
        }
        return Promise.resolve({ data: typeof cfg.data === 'function' ? cfg.data(arg) : cfg.data });
      };
    };
    window.functions = {};
    var functions = window.functions;
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    // Minimal stand-in for applyTheme() in app.html (same class-toggle mechanism).
    window.applyTheme = function (name) {
      document.body.classList.remove('theme-apple', 'theme-gold');
      if (name === 'apple') document.body.classList.add('theme-apple');
      if (name === 'gold') document.body.classList.add('theme-gold');
    };
    // Minimal stand-in for activityDefs/activityDefById in app.html — same
    // fallback shape (name defaults to the raw id when not found), used by
    // exusRenderProposalCard() to show a readable activity type name.
    window.activityDefs = [];
    var activityDefs = window.activityDefs;
    function activityDefById(id) {
      return activityDefs.find(a => a.id === id) || { name: id, points: 0, color: '#6c63ff', icon: 'ti-star' };
    }
    // Stand-in for loadPlanner()/renderGoal() — count calls so tests can
    // assert the "page is open -> refresh it" branches fired.
    window.loadPlannerCallCount = 0;
    window.loadPlanner = async function () { window.loadPlannerCallCount++; };
    var loadPlanner = window.loadPlanner;
    window.renderGoalCallCount = 0;
    window.renderGoal = async function () { window.renderGoalCallCount++; };
    var renderGoal = window.renderGoal;
    window.loadProfileCallCount = 0;
    window.loadProfile = async function () { window.loadProfileCallCount++; };
    var loadProfile = window.loadProfile;
  </script>
  <script>
    // ── "Ex-us" — prawdziwy asystent AI (Gemini, przez Cloud Functions
    // aiClassifyIntent/aiAssistantChat/aiConfirmTask/aiConfirmGoal/aiAssistantPing)
    // współdzielący zakładkę z Siri-ous wyżej. Każda wiadomość usera idzie
    // najpierw do aiClassifyIntent, które decyduje czy to zwykła rozmowa,
    // prośba o zadanie do Planera, czy prośba o cel na dashboardzie — patrz
    // komentarz w sendExusMessage. Wiadomości "chat" idą do aiAssistantChat
    // (conversationId spina je w jedną rozmowę po stronie backendu); pasek
    // limitu tokenów odświeżamy osobnym wywołaniem aiAssistantPing po każdej
    // wymianie, bo żadna z powyższych funkcji go nie zwraca. httpsCallable/
    // functions pochodzą z importu firebase-functions.js na górze pliku.
    const EXUS_HISTORY_KEY = 'lifexp-exus-history';
    const EXUS_CONV_KEY = 'lifexp-exus-conversation-id';
    const AICHAT_ACTIVE_KEY = 'lifexp-aichat-active';
    let exusMessages = [];
    // conversationId aktualnej rozmowy — null = następna wiadomość zakłada
    // nową sesję po stronie backendu. Trzymany też w localStorage (nie tylko
    // w tej zmiennej), żeby przetrwał odświeżenie strony w zgodzie z historią
    // wiadomości (która i tak jest tam zapisywana) — inaczej wiadomość po
    // odświeżeniu wyglądałaby na kontynuację, a backend zacząłby nową sesję.
    let exusConversationId = null;

    function exusSaveHistory() {
      try { localStorage.setItem(EXUS_HISTORY_KEY, JSON.stringify(exusMessages)); } catch (_) {}
    }

    function exusLoadHistory() {
      try { exusMessages = JSON.parse(localStorage.getItem(EXUS_HISTORY_KEY)) || []; } catch (_) { exusMessages = []; }
    }

    function exusSaveConversationId() {
      try {
        if (exusConversationId) localStorage.setItem(EXUS_CONV_KEY, exusConversationId);
        else localStorage.removeItem(EXUS_CONV_KEY);
      } catch (_) {}
    }

    function exusLoadConversationId() {
      try { exusConversationId = localStorage.getItem(EXUS_CONV_KEY) || null; } catch (_) { exusConversationId = null; }
    }

    function exusRenderMessages(animateLast) {
      const el = document.getElementById('exus-messages');
      if (!el) return;
      if (!exusMessages.length) {
        el.innerHTML = '<p class="exus-empty">Napisz coś do Ex-us — prawdziwego asystenta AI LifeXP.</p>';
        return;
      }
      el.innerHTML = exusMessages.map((m, i) => {
        const isLast = i === exusMessages.length - 1;
        const popClass = (animateLast && isLast) ? ' pop' : '';
        if (m.role === 'proposal') return exusRenderProposalCard(m, popClass);
        if (m.role === 'goal-proposal') return exusRenderGoalProposalCard(m, popClass);
        return `<div class="exus-row ${m.role}"><div class="exus-bubble${popClass}">${escapeHtml(m.text)}</div></div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
    }

    // Karta propozycji zadania (aiClassifyIntent → intent:"task", proposal:
    // { title, time, durationMin, type }). Nazwę typu bierzemy z
    // activityDefById — ta sama lista co w Planerze/Log Activity, już
    // wczytywana gdzie indziej w apce; activityDefById i tak sam pada z
    // powrotem na surowe id, jeśli defs nie są (jeszcze) załadowane, więc nie
    // trzeba tu nic dodatkowo doładowywać.
    function exusRenderProposalCard(m, popClass) {
      const p = m.proposal;
      const typeName = escapeHtml(activityDefById(p.type).name);
      const busy = m.status === 'confirming';
      return `<div class="exus-row ai"><div class="exus-bubble exus-proposal${popClass}">
        <div class="exus-proposal-head"><i class="ti ti-calendar-plus"></i> Propozycja zadania</div>
        <div class="exus-proposal-title">${escapeHtml(p.title)}</div>
        <div class="exus-proposal-meta">
          <span><i class="ti ti-clock"></i> ${escapeHtml(p.time)}</span>
          <span><i class="ti ti-hourglass"></i> ${p.durationMin} min</span>
          <span><i class="ti ti-tag"></i> ${typeName}</span>
        </div>
        <div class="exus-proposal-actions">
          <button class="exus-proposal-btn reject" ${busy ? 'disabled' : ''} onclick="exusRejectProposal('${m.id}')">Odrzuć</button>
          <button class="exus-proposal-btn confirm" ${busy ? 'disabled' : ''} onclick="exusConfirmProposal('${m.id}')">${busy ? 'Dodaję…' : 'Zatwierdź'}</button>
        </div>
      </div></div>`;
    }

    // Karta propozycji celu (aiClassifyIntent → intent:"goal", proposal:
    // { name, type, amount }), symetryczna do karty zadania powyżej — sama
    // struktura .exus-proposal*, tylko inna zawartość i inne wywołanie
    // backendu (aiConfirmGoal zamiast aiConfirmTask). type: "points"|"money"
    // — patrz komentarz przy exusConfirmGoalProposal co się dzieje z każdym.
    function exusRenderGoalProposalCard(m, popClass) {
      const p = m.proposal;
      const isMoney = p.type === 'money';
      const typeLabel = isMoney ? 'Cel pieniężny' : 'Cel punktowy';
      const amountText = isMoney
        ? Number(p.amount).toFixed(2).replace('.', ',') + ' zł'
        : Math.round(p.amount) + ' pkt';
      const busy = m.status === 'confirming';
      return `<div class="exus-row ai"><div class="exus-bubble exus-proposal${popClass}">
        <div class="exus-proposal-head"><i class="ti ti-target-arrow"></i> Propozycja celu</div>
        <div class="exus-proposal-title">🎯 ${escapeHtml(p.name)}</div>
        <div class="exus-proposal-meta">
          <span><i class="ti ti-tag"></i> ${typeLabel}</span>
          <span><i class="ti ti-flag"></i> ${amountText}</span>
        </div>
        <div class="exus-proposal-actions">
          <button class="exus-proposal-btn reject" ${busy ? 'disabled' : ''} onclick="exusRejectGoalProposal('${m.id}')">Odrzuć</button>
          <button class="exus-proposal-btn confirm" ${busy ? 'disabled' : ''} onclick="exusConfirmGoalProposal('${m.id}')">${busy ? 'Dodaję…' : 'Zatwierdź'}</button>
        </div>
      </div></div>`;
    }

    // Zasila pasek limitu prawdziwymi danymi z odpowiedzi aiAssistantPing
    // (tokensUsedToday/tokensLimitDaily/remainingPercent).
    function exusUpdateLimitBar(d) {
      const fill = document.getElementById('exus-limit-fill');
      const pct = document.getElementById('exus-limit-pct');
      const sub = document.getElementById('exus-limit-sub');
      if (!d || typeof d.remainingPercent !== 'number') return;
      const pctVal = Math.max(0, Math.min(100, d.remainingPercent));
      if (fill) {
        fill.style.width = pctVal + '%';
        fill.style.background = pctVal < 20
          ? 'var(--warn)'
          : 'linear-gradient(90deg, var(--accent), var(--accent2))';
      }
      if (pct) pct.textContent = Math.round(pctVal) + '% pozostało';
      if (sub) sub.textContent = (d.tokensUsedToday ?? '—') + ' / ' + (d.tokensLimitDaily ?? '—') + ' tokenów dziennie';
    }

    function loadExusChat() {
      exusLoadHistory();
      exusLoadConversationId();
      exusRenderMessages(false);
    }

    // "Nowa rozmowa" — czyści widoczną historię w UI i zeruje conversationId,
    // żeby kolejna wiadomość założyła nową sesję w Firestore zamiast
    // kontynuować starą.
    window.exusNewConversation = () => {
      exusMessages = [];
      exusConversationId = null;
      exusSaveHistory();
      exusSaveConversationId();
      exusRenderMessages(false);
    };

    // Przełącznik Siri-ous / Ex-us — pill-toggle "kropki jak zakładki
    // przeglądarki": aktywna rozwinięta, nieaktywna skurczona do litery.
    window.switchAiAssistant = (which) => {
      try { localStorage.setItem(AICHAT_ACTIVE_KEY, which); } catch (_) {}
      const aicShell = document.getElementById('aic-shell');
      const exusShell = document.getElementById('exus-shell');
      if (aicShell) aicShell.style.display = which === 'exus' ? 'none' : 'flex';
      if (exusShell) exusShell.style.display = which === 'exus' ? 'flex' : 'none';
      const siriPill = document.getElementById('aichat-pill-siri');
      const exusPill = document.getElementById('aichat-pill-exus');
      if (siriPill) siriPill.classList.toggle('active', which !== 'exus');
      if (exusPill) exusPill.classList.toggle('active', which === 'exus');
    };

    window.sendExusMessage = async () => {
      const input = document.getElementById('exus-input');
      const text = input.value.trim();
      if (!text) return;
      exusMessages.push({ role: 'user', text });
      exusSaveHistory();
      exusRenderMessages(true);
      input.value = '';

      const el = document.getElementById('exus-messages');
      const typingId = 'exus-typing-' + Date.now();
      el.insertAdjacentHTML('beforeend',
        `<div class="exus-row ai" id="${typingId}"><div class="exus-bubble exus-typing"><span></span><span></span><span></span></div></div>`);
      el.scrollTop = el.scrollHeight;

      let newMessage;
      try {
        // Każda wiadomość usera idzie NAJPIERW do aiClassifyIntent, które samo
        // decyduje co to jest: prośba o zadanie do Planera (intent:"task"),
        // prośba o cel na dashboardzie (intent:"goal"), czy zwykła rozmowa
        // (intent:"chat"). Dla "task"/"goal" pokazujemy odpowiednią kartę
        // propozycji i aiAssistantChat wcale nie jest wołane (patrz
        // exusRenderProposalCard/exusRenderGoalProposalCard niżej). Dla "chat"
        // z dodatkowym polem `note` (np. limit 3 celów już osiągnięty) — samo
        // `note` jako wiadomość systemowa, bez wołania aiAssistantChat. Zwykłe
        // "chat" bez `note` to dokładnie ta sama ścieżka co wcześniej.
        const classify = httpsCallable(functions, 'aiClassifyIntent');
        const classifyRes = await classify({ message: text });
        const cd = classifyRes.data || {};

        if (cd.intent === 'task' && cd.proposal) {
          newMessage = { role: 'proposal', id: 'prop-' + Date.now(), proposal: cd.proposal, status: 'pending' };
        } else if (cd.intent === 'goal' && cd.proposal) {
          newMessage = { role: 'goal-proposal', id: 'goalprop-' + Date.now(), proposal: cd.proposal, status: 'pending' };
        } else if (cd.note) {
          newMessage = { role: 'system', text: cd.note };
        } else {
          const chat = httpsCallable(functions, 'aiAssistantChat');
          const payload = { message: text };
          // conversationId pomijamy przy pierwszej wiadomości nowej rozmowy —
          // backend sam ją wtedy zakłada i zwraca świeże id w odpowiedzi.
          if (exusConversationId) payload.conversationId = exusConversationId;
          const res = await chat(payload);
          const d = res.data || {};
          if (d.conversationId) {
            exusConversationId = d.conversationId;
            exusSaveConversationId();
          }
          newMessage = { role: 'ai', text: d.reply || '(brak odpowiedzi)' };
        }
      } catch (err) {
        newMessage = { role: 'system', text: err.message || err.code || 'Nieznany błąd połączenia z Ex-us.' };
      }

      const typingEl = document.getElementById(typingId);
      if (typingEl) typingEl.remove();
      exusMessages.push(newMessage);
      exusSaveHistory();
      exusRenderMessages(true);

      // Żadne z powyższych wywołań nie zwraca danych licznika, więc pasek
      // limitu odświeżamy osobnym wywołaniem aiAssistantPing — kolejne
      // wywołanie backendu na wiadomość, akceptowalne, bo priorytetem jest
      // zawsze aktualny wskaźnik. Błąd tego wywołania nie może zepsuć już
      // wyświetlonej odpowiedzi/karty, więc łapiemy go osobno i po cichu
      // pomijamy (pasek po prostu zostaje przy starej wartości).
      try {
        const ping = httpsCallable(functions, 'aiAssistantPing');
        const res = await ping();
        exusUpdateLimitBar(res.data || {});
      } catch (_) {}
    };

    // Zatwierdzenie karty propozycji zadania — woła aiConfirmTask z DOKŁADNIE
    // polami z proposal (title/time/durationMin/type), po sukcesie zamienia
    // kartę w zwykły tekstowy dymek potwierdzenia i odświeża Planer dnia,
    // jeśli akurat jest otwarty na tej samej stronie.
    window.exusConfirmProposal = async (id) => {
      const msg = exusMessages.find(m => m.id === id && m.role === 'proposal');
      if (!msg || msg.status !== 'pending') return;
      msg.status = 'confirming';
      exusRenderMessages(false);
      try {
        const confirmTask = httpsCallable(functions, 'aiConfirmTask');
        const { title, time, durationMin, type } = msg.proposal;
        await confirmTask({ title, time, durationMin, type });

        msg.role = 'ai';
        msg.text = `Dodano zadanie: ${title} o ${time}`;
        delete msg.proposal;
        delete msg.status;
        exusSaveHistory();
        exusRenderMessages(true);

        // Jeśli Planer dnia jest akurat otwarty (ta sama zakładka/strona co
        // czat nie istnieje — to osobna strona apki), odśwież jego listę
        // zadań, żeby nowo dodane od razu było widoczne bez ręcznego wejścia.
        if (document.getElementById('page-planner')?.classList.contains('active')) {
          await loadPlanner();
        }
      } catch (err) {
        msg.status = 'pending';
        exusRenderMessages(false);
        exusMessages.push({ role: 'system', text: err.message || err.code || 'Nie udało się dodać zadania.' });
        exusSaveHistory();
        exusRenderMessages(true);
      }
    };

    // Odrzucenie karty propozycji — nic do backendu, karta zamienia się w
    // zwykły tekstowy dymek, rozmowa toczy się dalej normalnie.
    window.exusRejectProposal = (id) => {
      const msg = exusMessages.find(m => m.id === id && m.role === 'proposal');
      if (!msg) return;
      msg.role = 'ai';
      msg.text = 'Dobrze, nie dodaję tego zadania.';
      delete msg.proposal;
      delete msg.status;
      exusSaveHistory();
      exusRenderMessages(false);
    };

    // Zatwierdzenie karty propozycji celu — woła aiConfirmGoal z DOKŁADNIE
    // polami z proposal (name/type/amount), symetrycznie do exusConfirmProposal
    // powyżej. Po sukcesie zamienia kartę w zwykły tekstowy dymek i odświeża
    // karty celów na Dashboardzie (loadProfile, bo Cloud Function pisze przez
    // Admin SDK — lokalny userProfile o nowym celu jeszcze nie wie — a potem
    // renderGoal), jeśli Dashboard jest akurat otwarty.
    window.exusConfirmGoalProposal = async (id) => {
      const msg = exusMessages.find(m => m.id === id && m.role === 'goal-proposal');
      if (!msg || msg.status !== 'pending') return;
      msg.status = 'confirming';
      exusRenderMessages(false);
      try {
        const confirmGoal = httpsCallable(functions, 'aiConfirmGoal');
        const { name, type, amount } = msg.proposal;
        await confirmGoal({ name, type, amount });

        msg.role = 'ai';
        msg.text = `Dodano cel: ${name}`;
        delete msg.proposal;
        delete msg.status;
        exusSaveHistory();
        exusRenderMessages(true);

        if (document.getElementById('page-dashboard')?.classList.contains('active')) {
          await loadProfile();
          await renderGoal();
        }
      } catch (err) {
        msg.status = 'pending';
        exusRenderMessages(false);
        exusMessages.push({ role: 'system', text: err.message || err.code || 'Nie udało się dodać celu.' });
        exusSaveHistory();
        exusRenderMessages(true);
      }
    };

    // Odrzucenie karty propozycji celu — nic do backendu, karta zamienia się
    // w zwykły tekstowy dymek, rozmowa toczy się dalej normalnie.
    window.exusRejectGoalProposal = (id) => {
      const msg = exusMessages.find(m => m.id === id && m.role === 'goal-proposal');
      if (!msg) return;
      msg.role = 'ai';
      msg.text = 'Dobrze, nie dodaję tego celu.';
      delete msg.proposal;
      delete msg.status;
      exusSaveHistory();
      exusRenderMessages(false);
    };

  </script>
  <script>
    // Mirrors app.html's loadAiChat() initial call (fired by the real
    // showPage('ai-chat') hook) — loads history and sets the default tab.
    loadExusChat();
    switchAiAssistant('siri');
  </script>
</body>
</html>
